<div id="proyect" class="contenedor"> <!-- el id me ayuda a identificar el elemento y a buscar el campo del contenedor -->
  <h1>{{titulo}}</h1>
  
  <section id="proyectos" class="proyectos">


    <article class="proyecto" *ngFor="let proyecto of proyectos">
      <img [src]="proyecto.imagen" alt="{{ proyecto.nombre }}">
      <h2>{{ proyecto.nombre }}</h2>
      <p>{{ proyecto.descripcion }}</p>
      
      <button type="button" (click)="verProyecto(proyecto)">codigo del proyecto en github</button>
      <button type="button" (click)="verLink(proyecto)">ver proyecto</button>
    </article>


  </section>
</div>
