<section id="inicio"  class="inicio" *ngFor="let item of items">
    <div class="textInicio">
        <h1>{{ item.nombre }}</h1>
        <h6>{{ item.profesion }}</h6>
        <p>{{ item.descripcion }}</p>
    </div>

  
         <div class="imgInicio">
    <img [src]="item.fotoPerfil" alt="Foto de perfil">
  </div>
   

</section>
